name: Build Dev Docker Images

on:
  push:
    branches: [based/develop]

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    strategy:
      matrix:
        platform:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
      fail-fast: false

    name: Build & Push based-op-geth (${{ matrix.platform.arch }}) (dev)
    runs-on: ${{ matrix.platform.runner }}
    env:
      IMAGE_REG: ghcr.io/gattaca-com/based-op-geth
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
      - uses: docker/setup-buildx-action@v3
        with:
          builder: multiarch-builder
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (dev)
        id: meta
        run: |
          # Extract git commit and date
          GIT_COMMIT=$(git rev-parse HEAD)
          GIT_DATE=$(git log -1 --format=%ct)
          echo "git_commit=$GIT_COMMIT" >> $GITHUB_OUTPUT
          echo "git_date=$GIT_DATE" >> $GITHUB_OUTPUT

      - name: Build & Push based-op-geth (dev)
        run: |
          # Build and push the image
          docker buildx build \
            --platform linux/${{ matrix.platform.arch == 'arm64' && 'arm64/v8' || matrix.platform.arch }} \
            --build-arg COMMIT=${{ steps.meta.outputs.git_commit }} \
            --build-arg VERSION=dev-${{ github.sha }} \
            --build-arg BUILDNUM=${{ github.run_number }} \
            --tag ghcr.io/gattaca-com/based-op-geth/based-op-geth:dev-${{ github.sha }}-${{ matrix.platform.arch }} \
            ${{ !contains(github.ref_name, 'rc') && format('--tag ghcr.io/gattaca-com/based-op-geth/based-op-geth:dev-latest-{0}', matrix.platform.arch) || '' }} \
            --push \
            .

  create-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_REG: ghcr.io/gattaca-com/based-op-geth

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & Push Multi-Arch Manifests
        run: |
          ghcr="ghcr.io/gattaca-com/based-op-geth"
          tag="dev-${{ github.sha }}"

          # Use buildx imagetools to create multi-arch manifest
          docker buildx imagetools create \
            --tag $ghcr/based-op-geth:$tag \
            $ghcr/based-op-geth:$tag-amd64 \
            $ghcr/based-op-geth:$tag-arm64

          if [[ ! "$tag" =~ "rc" ]]; then
            docker buildx imagetools create \
              --tag $ghcr/based-op-geth:dev-latest \
              $ghcr/based-op-geth:dev-latest-amd64 \
              $ghcr/based-op-geth:dev-latest-arm64
          fi
